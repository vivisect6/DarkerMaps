<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} - {% endif %}{{ site.title }}</title>
    <meta name="description" content="{{ page.description | default: site.description }}">

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
          integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
          crossorigin="anonymous">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
    <header class="site-header">
        <nav class="navbar">
            <a href="{{ '/' | relative_url }}" class="site-title">{{ site.title }}</a>
            <div class="nav-links">
                <a href="{{ '/' | relative_url }}">Maps</a>
                <a href="https://github.com/vivisect6/DarkerMaps" target="_blank">GitHub</a>
            </div>
        </nav>
    </header>

    <main class="site-content">
        {{ content }}
    </main>

    <footer class="site-footer">
        <p>
            Code: <a href="https://github.com/vivisect6/DarkerMaps/blob/main/LICENSE" target="_blank">MIT License</a> |
            Data: <a href="https://github.com/vivisect6/DarkerMaps/blob/main/LICENSE-DATA" target="_blank">ODbL License</a> |
            <a href="{{ '/attributions' | relative_url }}">Attributions</a>
        </p>
        <p>
            <a href="https://github.com/vivisect6/DarkerMaps/blob/main/CONTRIBUTING.md">Contribute locations via Pull Request</a>
        </p>
    </footer>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
            integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
            crossorigin="anonymous"></script>

    <!-- js-yaml for parsing YAML data -->
    <script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>

    <!-- Custom JS -->
    <script>window.BASE_URL = "{{ site.baseurl }}";</script>
    <script src="{{ '/assets/js/map.js' | relative_url }}"></script>
</body>
</html>
